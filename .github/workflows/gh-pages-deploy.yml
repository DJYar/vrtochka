name: Deploy Nuxt to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Configure Nuxt public paths
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          owner="${GITHUB_REPOSITORY_OWNER}"

          if [[ "$repo_name" == "$owner.github.io" ]]; then
            base_url="/"
            site_url="https://${owner}.github.io"
          else
            base_url="/${repo_name}/"
            site_url="https://${owner}.github.io/${repo_name}"
          fi

          echo "NUXT_APP_BASE_URL=${base_url}" >> "$GITHUB_ENV"
          echo "NUXT_PUBLIC_SITE_URL=${site_url}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build static site
        run: npx nuxt build --preset github_pages

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .output/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
